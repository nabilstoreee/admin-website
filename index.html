<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abil-AI - Chat AI Assistant</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon.png" type="image/png">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="theme-color" content="#ff0050">

    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background-color: #0f0f0f; color: #e0e0e0; overflow-x: hidden; min-height: 100vh; }
        .bg-grid { background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0); background-size: 40px 40px; }
        .glass { background: rgba(20, 20, 20, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .btn-gradient { background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%); transition: all 0.3s ease; cursor: pointer; border: none; }
        .btn-gradient:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.5); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes slideInLeft { from { opacity: 0; transform: translateX(-30px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
        .animate-fade-in { animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-slide-in-right { animation: slideInRight 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-slide-in-left { animation: slideInLeft 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-float { animation: float 3s ease-in-out infinite; }
        .typing-indicator { display: inline-flex; gap: 4px; padding: 8px 0; }
        .typing-dot { width: 8px; height: 8px; border-radius: 50%; background: linear-gradient(135deg, #3b82f6, #8b5cf6); animation: bounce 0.6s ease-in-out infinite; }
        .typing-dot:nth-child(2) { animation-delay: 0.1s; } .typing-dot:nth-child(3) { animation-delay: 0.2s; }
        ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(to bottom, #3b82f6, #8b5cf6); border-radius: 10px; }

        /* Auth Screen */
        .auth-screen { position: fixed; inset: 0; z-index: 200; background: #0f0f0f; display: flex; align-items: center; justify-content: center; flex-direction: column; transition: opacity 0.4s ease, visibility 0.4s ease; }
        .auth-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .auth-box { width: 90%; max-width: 400px; background: rgba(20,20,20,0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; padding: 32px 24px; text-align: center; }
        .auth-box .brand-logo { width: 64px; height: 64px; border-radius: 18px; background: linear-gradient(135deg, #3b82f6, #8b5cf6); display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; box-shadow: 0 12px 30px -8px rgba(59,130,246,0.5); }
        .auth-box .brand-logo span { color: white; font-weight: 800; font-size: 30px; }
        .auth-box h2 { font-size: 1.5rem; font-weight: 800; color: white; margin-bottom: 4px; }
        .auth-box p { color: #6b7280; font-size: 0.85rem; margin-bottom: 20px; }
        .auth-input { width: 100%; background: #161616; border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; padding: 14px 18px; color: white; font-size: 0.9rem; outline: none; transition: all 0.3s ease; margin-bottom: 12px; }
        .auth-input:focus { border-color: rgba(59,130,246,0.5); box-shadow: 0 0 20px rgba(59,130,246,0.1); }
        .auth-link { color: #3b82f6; cursor: pointer; font-size: 0.8rem; margin-top: 8px; display: inline-block; }
        .auth-link:hover { text-decoration: underline; }

        /* Sidebar */
        .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 300px; z-index: 40; transform: translateX(-100%); transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1); background: rgba(18, 22, 28, 0.96); backdrop-filter: blur(20px); border-right: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; overflow-y: auto; }
        .sidebar.open { transform: translateX(0); }
        .sidebar-close-top { position: absolute; top: 16px; right: 16px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; color: #9ca3af; cursor: pointer; z-index: 5; }
        .sidebar-close-top:hover { background: rgba(255,255,255,0.1); color: white; }
        @media (min-width: 768px) { .sidebar-close-top { display: none !important; } }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(3px); z-index: 35; opacity: 0; visibility: hidden; transition: all 0.3s ease; }
        .overlay.open { opacity: 1; visibility: visible; }
        @media (min-width: 768px) { .sidebar { position: relative !important; transform: translateX(0) !important; width: 280px; flex-shrink: 0; border-radius: 0 20px 20px 0; z-index: 10; } .overlay { display: none !important; } .menu-toggle { display: none !important; } }
        .sidebar-brand { padding: 28px 20px 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .sidebar-brand .brand-logo { width: 64px; height: 64px; border-radius: 18px; background: linear-gradient(135deg, #3b82f6, #8b5cf6); display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; box-shadow: 0 12px 30px -8px rgba(59,130,246,0.5); }
        .sidebar-brand .brand-logo span { color: white; font-weight: 800; font-size: 30px; }
        .sidebar-brand h2 { font-size: 1.3rem; font-weight: 800; color: white; margin-bottom: 4px; }
        .sidebar-brand .gradient-text { background: linear-gradient(135deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .sidebar-brand p { color: #6b7280; font-size: 0.75rem; }
        .sidebar-new-chat { margin: 12px 16px; padding: 12px; border-radius: 14px; background: linear-gradient(135deg, rgba(59,130,246,0.2), rgba(139,92,246,0.2)); border: 1px solid rgba(59,130,246,0.3); color: white; font-weight: 600; font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .sidebar-new-chat:hover { background: linear-gradient(135deg, rgba(59,130,246,0.3), rgba(139,92,246,0.3)); }
        .chat-list { flex: 1; overflow-y: auto; padding: 8px; }
        .chat-list-item { padding: 12px 16px; border-radius: 12px; cursor: pointer; transition: all 0.3s ease; margin-bottom: 4px; display: flex; align-items: center; justify-content: space-between; color: #9ca3af; font-size: 0.85rem; }
        .chat-list-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .chat-list-item.active { background: rgba(59,130,246,0.15); color: white; border: 1px solid rgba(59,130,246,0.2); }
        .chat-list-item .delete-chat { opacity: 0; transition: all 0.3s ease; background: none; border: none; color: #6b7280; cursor: pointer; padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; }
        .chat-list-item:hover .delete-chat { opacity: 1; }
        .chat-list-item .delete-chat:hover { background: rgba(239,68,68,0.2); color: #ef4444; }
        .sidebar-footer { padding: 16px; border-top: 1px solid rgba(255,255,255,0.05); text-align: center; }
        .sidebar-footer p { font-size: 0.6rem; color: #4b5563; }
        .menu-toggle { width: 36px; height: 36px; border-radius: 10px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; cursor: pointer; color: #9ca3af; }
        .menu-toggle:hover { background: rgba(255,255,255,0.1); color: white; }
        .app-layout { display: flex; min-height: 100vh; }
        .main-content { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; z-index: 10; }

        /* Chat */
        .message-user { background: linear-gradient(135deg, rgba(59,130,246,0.25), rgba(139,92,246,0.25)); border: 1px solid rgba(59,130,246,0.3); border-radius: 20px 20px 4px 20px; padding: 14px 18px; max-width: 80%; margin-left: auto; word-wrap: break-word; }
        .message-ai { background: rgba(26,26,26,0.9); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px 20px 20px 4px; padding: 14px 18px; max-width: 85%; word-wrap: break-word; }
        .message-ai pre { background: #141414; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 16px; overflow-x: auto; margin: 12px 0; position: relative; }
        .message-ai code { background: rgba(59,130,246,0.1); padding: 2px 8px; border-radius: 6px; font-size: 0.85em; color: #93c5fd; }
        .message-ai pre code { background: none; padding: 0; color: inherit; }
        .message-ai p { margin: 8px 0; line-height: 1.7; }
        .copy-btn { position: absolute; top: 8px; right: 8px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; padding: 6px 12px; cursor: pointer; font-size: 0.75rem; color: #9ca3af; }
        .copy-btn:hover { background: rgba(59,130,246,0.2); color: #60a5fa; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #1f1f1f; color: white; padding: 12px 24px; border-radius: 50px; z-index: 1000; font-size: 0.85rem; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); animation: fadeIn 0.3s ease; white-space: nowrap; }
        .provider-badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; cursor: pointer; position: relative; }
        .badge-openai { background: rgba(16,163,127,0.15); border: 1px solid rgba(16,163,127,0.3); color: #10a37f; }
        .badge-deepseek { background: rgba(59,130,246,0.15); border: 1px solid rgba(59,130,246,0.3); color: #3b82f6; }
        .badge-gemini { background: rgba(139,92,246,0.15); border: 1px solid rgba(139,92,246,0.3); color: #8b5cf6; }
        .badge-kimi { background: rgba(236,72,153,0.15); border: 1px solid rgba(236,72,153,0.3); color: #ec4899; }
        .badge-dalle { background: rgba(245,158,11,0.15); border: 1px solid rgba(245,158,11,0.3); color: #f59e0b; }
        .badge-theresav { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); color: #22c55e; }
        .badge-groq { background: rgba(245,158,11,0.2); border: 1px solid rgba(245,158,11,0.4); color: #f59e0b; }

        .provider-dropdown { position: absolute; top: 100%; right: 0; margin-top: 8px; background: #1a1a1a; border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 8px; min-width: 200px; z-index: 30; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .provider-dropdown.show { display: block; }
        .provider-option { padding: 10px 14px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 0.8rem; font-weight: 600; color: #cbd5e1; transition: all 0.2s; }
        .provider-option:hover { background: rgba(255,255,255,0.05); color: white; }
        .provider-option.locked { opacity: 0.5; cursor: not-allowed; }
        .provider-option.locked:hover { background: transparent; color: #cbd5e1; }

        .suggestion-chip { display: inline-flex; align-items: center; gap: 6px; padding: 10px 18px; background: rgba(59,130,246,0.08); border: 1px solid rgba(59,130,246,0.2); border-radius: 14px; margin: 4px; cursor: pointer; font-size: 0.85rem; color: #cbd5e1; }
        .suggestion-chip:hover { background: rgba(59,130,246,0.18); border-color: rgba(59,130,246,0.4); transform: translateY(-2px); color: white; }

        /* Modal */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 150; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal { background: linear-gradient(135deg, #1a1a2e, #16213e); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 28px; width: 90%; max-width: 550px; max-height: 85vh; overflow-y: auto; transform: scale(0.95); transition: transform 0.3s ease; }
        .modal-overlay.active .modal { transform: scale(1); }
        .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .modal-header h2 { font-size: 1.25rem; font-weight: 800; color: white; }
        .modal-close-btn { background: none; border: none; color: #9ca3af; cursor: pointer; font-size: 1.25rem; transition: color 0.2s; }
        .modal-close-btn:hover { color: white; }
        .modal .form-group { margin-bottom: 16px; }
        .modal .form-label { display: block; font-size: 0.7rem; font-weight: 700; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
        .modal .form-input, .modal .form-select { width: 100%; background: #161616; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px 16px; color: white; font-size: 0.9rem; outline: none; transition: all 0.3s ease; pointer-events: auto; }
        .modal .form-input:focus, .modal .form-select:focus { border-color: rgba(59,130,246,0.5); box-shadow: 0 0 20px rgba(59,130,246,0.1); }
        .modal .input-wrapper { position: relative; }
        .modal .toggle-btn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #6b7280; cursor: pointer; }

        .vip-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.8rem; }
        .vip-table th, .vip-table td { padding: 8px 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .vip-table th { color: #9ca3af; font-weight: 600; text-transform: uppercase; font-size: 0.65rem; letter-spacing: 0.05em; }
        .vip-table .delete-vip { color: #ef4444; cursor: pointer; padding: 4px 8px; border-radius: 6px; }
        .vip-table .delete-vip:hover { background: rgba(239,68,68,0.2); }

        @media (max-width: 767px) { .message-user, .message-ai { max-width: 90%; } .sidebar { width: 85vw; max-width: 300px; } }
    </style>
</head>
<body class="bg-grid">

    <div id="authScreen" class="auth-screen"><div class="auth-box" id="authBox"></div></div>
    <div id="overlay" class="overlay" onclick="closeSidebar()"></div>

    <div class="app-layout">
        <aside id="sidebar" class="sidebar">
            <button class="sidebar-close-top" onclick="closeSidebar()"><i class="fas fa-times"></i></button>
            <div class="sidebar-brand">
                <div class="brand-logo animate-float"><span>A</span></div>
                <h2><span class="gradient-text">Abil-AI Assistant</span></h2>
                <p>Asisten AI cerdas buatan Abil</p>
            </div>
            <button onclick="newChat(); closeSidebar();" class="sidebar-new-chat"><i class="fas fa-plus"></i> buat Obrolan baru</button>
            <div class="chat-list" id="chatList"><div style="text-align:center;padding:20px;color:#6b7280;font-size:0.8rem;"><i class="fas fa-inbox mb-2" style="font-size:1.5rem;display:block;"></i>Belum ada riwayat</div></div>
            <div class="sidebar-footer"><p>Abil-AI © 2025 • Dibuat oleh Abil</p></div>
        </aside>

        <div class="main-content">
            <header class="glass border-b border-white/5 px-4 py-3 sticky top-0 z-20">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <button onclick="toggleSidebar()" class="menu-toggle"><i class="fas fa-bars"></i></button>
                        <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center shadow-md shadow-blue-500/25"><span class="text-white font-extrabold text-sm">A</span></div>
                        <div><h1 class="text-white font-extrabold text-sm leading-tight">Abil-AI</h1><p class="text-gray-500 text-[10px]"><span class="w-1 h-1 rounded-full bg-green-500 inline-block"></span> Online</p></div>
                    </div>
                    <div class="flex items-center gap-2">
                        <div style="position: relative;">
                            <span id="providerBadge" class="provider-badge badge-openai" onclick="toggleProviderDropdown()">
                                <i class="fas fa-robot"></i> <span id="providerName">ChatGPT</span> <i class="fas fa-chevron-down" style="font-size:0.6rem; margin-left:2px;"></i>
                            </span>
                            <div id="providerDropdown" class="provider-dropdown"></div>
                        </div>
                        <button id="vipBtn" onclick="openVipModal()" class="w-9 h-9 rounded-xl bg-yellow-500/10 hover:bg-yellow-500/20 border border-yellow-500/30 flex items-center justify-center transition-all text-yellow-500 hover:text-yellow-400" title="Kelola VIP" style="display:none;"><i class="fas fa-crown"></i></button>
                        <button id="adminSettingsBtn" onclick="openSettingsModal()" class="w-9 h-9 rounded-xl bg-white/5 hover:bg-white/10 border border-white/10 flex items-center justify-center transition-all text-gray-400 hover:text-white" title="Pengaturan API" style="display:none;"><i class="fas fa-cog"></i></button>
                        <button onclick="logout()" class="w-9 h-9 rounded-xl bg-white/5 hover:bg-white/10 border border-white/10 flex items-center justify-center transition-all text-gray-400 hover:text-white" title="Logout"><i class="fas fa-sign-out-alt"></i></button>
                    </div>
                </div>
            </header>

            <main class="flex-1 overflow-y-auto px-4 py-6" id="chatContainer"><div class="max-w-4xl mx-auto space-y-4" id="messagesContainer"></div></main>

            <footer class="glass border-t border-white/5 px-4 py-4 sticky bottom-0 z-20">
                <div class="max-w-4xl mx-auto"><div class="relative">
                    <textarea id="userInput" class="w-full bg-[#161616] border border-white/10 rounded-2xl py-4 pl-4 pr-14 text-white placeholder-gray-600 resize-none focus:outline-none focus:border-blue-500/50 transition-all text-sm" placeholder="Ketik pesan..." rows="1" onkeydown="handleKeyDown(event)"></textarea>
                    <button onclick="sendMessage()" class="absolute right-2 top-1/2 -translate-y-1/2 w-10 h-10 btn-gradient rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/25"><svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg></button>
                </div><p class="text-center text-[10px] text-gray-600 mt-2">Abil-AI • Dibuat oleh Abil</p></div>
            </footer>
        </div>
    </div>

    <div id="settingsModal" class="modal-overlay" onclick="closeSettingsOutside(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header"><h2><i class="fas fa-cog text-blue-500"></i> Pengaturan API</h2><button class="modal-close-btn" onclick="closeSettingsModal()"><i class="fas fa-times"></i></button></div>
            <div class="flex flex-wrap gap-2 mb-6">
                <button onclick="switchProviderTab('openai')" id="tab-openai" class="provider-tab px-4 py-2 rounded-xl text-xs font-bold bg-white/5 border border-white/10 text-gray-400">ChatGPT</button>
                <button onclick="switchProviderTab('gemini')" id="tab-gemini" class="provider-tab px-4 py-2 rounded-xl text-xs font-bold bg-white/5 border border-white/10 text-gray-400">Gemini</button>
                <button onclick="switchProviderTab('kimi')" id="tab-kimi" class="provider-tab px-4 py-2 rounded-xl text-xs font-bold bg-white/5 border border-white/10 text-gray-400">Kimi</button>
                <button onclick="switchProviderTab('deepseek')" id="tab-deepseek" class="provider-tab px-4 py-2 rounded-xl text-xs font-bold bg-white/5 border border-white/10 text-gray-400">DeepSeek</button>
                <button onclick="switchProviderTab('dalle')" id="tab-dalle" class="provider-tab px-4 py-2 rounded-xl text-xs font-bold bg-white/5 border border-white/10 text-gray-400">DALL-E</button>
                <button onclick="switchProviderTab('theresav')" id="tab-theresav" class="provider-tab px-4 py-2 rounded-xl text-xs font-bold bg-white/5 border border-white/10 text-gray-400">Theresav</button>
                <button onclick="switchProviderTab('groq')" id="tab-groq" class="provider-tab px-4 py-2 rounded-xl text-xs font-bold bg-white/5 border border-white/10 text-gray-400">Groq</button>
            </div>
            <div class="space-y-4">
                <div class="form-group"><label class="form-label"><i class="fas fa-key"></i> API Key <span id="providerLabel">(ChatGPT)</span></label><div class="input-wrapper"><input type="password" id="apiKeyInput" class="form-input" placeholder="Masukkan API Key..."><button onclick="toggleApiKeyVisibility()" class="toggle-btn"><i class="fas fa-eye" id="eyeIcon"></i></button></div></div>
                <div class="form-group" id="chatIdGroup" style="display:none;"><label class="form-label"><i class="fas fa-comment"></i> Chat ID</label><input type="text" id="chatIdInput" class="form-input" placeholder="Masukkan Chat ID..."></div>
                <div class="form-group"><label class="form-label"><i class="fas fa-link"></i> API Endpoint</label><input type="text" id="apiEndpoint" class="form-input" placeholder="https://api.example.com/v1/chat/completions"></div>
                <div class="form-group"><label class="form-label"><i class="fas fa-microchip"></i> Model</label><select id="modelSelect" class="form-select"></select></div>
                <div class="form-group"><label class="form-label"><i class="fas fa-tag"></i> Nama Tampilan</label><input type="text" id="customNameInput" class="form-input" placeholder="Nama versi (misal: Abil-Ai v5.6 pro)"></div>
                <button onclick="saveSettings()" class="w-full btn-gradient text-white font-bold py-3.5 rounded-xl"><i class="fas fa-save mr-2"></i> Simpan</button>
                <p id="settingsStatus" class="text-center text-xs text-gray-500 min-h-[20px]"></p>
            </div>
        </div>
    </div>

    <div id="vipModal" class="modal-overlay" onclick="closeVipOutside(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header"><h2><i class="fas fa-crown text-yellow-500"></i> Kelola Akses VIP</h2><button class="modal-close-btn" onclick="closeVipModal()"><i class="fas fa-times"></i></button></div>
            <div class="space-y-4">
                <div class="form-group"><label class="form-label"><i class="fas fa-envelope"></i> Email Pengguna</label><input type="email" id="vipEmailInput" class="form-input" placeholder="user@example.com"></div>
                <div class="form-group"><label class="form-label"><i class="fas fa-microchip"></i> Provider VIP</label><select id="vipProviderSelect" class="form-select"><option value="dalle">Abil-Ai v5.6 pro (DALL-E)</option><option value="theresav">Abil-Ai v6.6 plus (Theresav)</option><option value="groq">Abil-Ai v7.5 ultra (Groq)</option></select></div>
                <div class="form-group"><label class="form-label"><i class="fas fa-calendar"></i> Durasi (hari)</label><input type="number" id="vipDurationInput" class="form-input" value="3" min="1" max="365"></div>
                <button onclick="addVipAccess()" class="w-full btn-gradient text-white font-bold py-3.5 rounded-xl"><i class="fas fa-plus mr-2"></i> Berikan Akses</button>
                <div id="vipStatus" class="text-center text-xs text-gray-500 min-h-[20px]"></div>
                <div class="border-t border-white/10 pt-4 mt-4"><h3 class="text-white font-bold text-sm mb-3">Daftar Akses VIP Aktif</h3><div id="vipListContainer" style="max-height:200px;overflow-y:auto;"><p class="text-gray-600 text-xs">Belum ada akses VIP.</p></div></div>
            </div>
        </div>
    </div>

    <script>
        const ADMIN_EMAIL = 'admin@abil.ai', ADMIN_PASSWORD = 'admin123';
        function getUsers() { return JSON.parse(localStorage.getItem('abilai_users') || '[]'); }
        function saveUsers(u) { localStorage.setItem('abilai_users', JSON.stringify(u)); }
        function initUsers() { let users = getUsers(); if (!users.find(u => u.email === ADMIN_EMAIL)) { users.push({ email: ADMIN_EMAIL, password: ADMIN_PASSWORD, role: 'admin' }); saveUsers(users); } }
        let currentUser = JSON.parse(localStorage.getItem('abilai_currentUser') || 'null');

        function renderAuthForm(mode = 'login') {
            document.getElementById('authBox').innerHTML = `
                <div class="brand-logo"><span>A</span></div><h2>Abil-AI</h2><p>${mode === 'login' ? 'Masuk ke akun Anda' : 'Daftar akun baru'}</p>
                <input type="email" id="authEmail" class="auth-input" placeholder="Email">
                <input type="password" id="authPassword" class="auth-input" placeholder="Password">
                ${mode === 'register' ? '<input type="password" id="authConfirmPassword" class="auth-input" placeholder="Konfirmasi Password">' : ''}
                <button onclick="${mode === 'login' ? 'login()' : 'register()'}" class="w-full btn-gradient text-white font-bold py-3.5 rounded-xl">${mode === 'login' ? '<i class="fas fa-sign-in-alt mr-2"></i> Masuk' : '<i class="fas fa-user-plus mr-2"></i> Daftar'}</button>
                <p id="authError" class="text-red-400 text-xs mt-3 min-h-[16px]"></p>
                <p class="text-gray-500 text-xs mt-4">${mode === 'login' ? 'Belum punya akun? <span class="auth-link" onclick="renderAuthForm(\'register\')">Daftar di sini</span>' : 'Sudah punya akun? <span class="auth-link" onclick="renderAuthForm(\'login\')">Login di sini</span>'}</p>`;
        }

        function login() {
            const email = document.getElementById('authEmail').value.trim(), password = document.getElementById('authPassword').value;
            const user = getUsers().find(u => u.email === email && u.password === password);
            if (!user) { document.getElementById('authError').textContent = 'Email atau password salah!'; return; }
            currentUser = { email: user.email, role: user.role };
            localStorage.setItem('abilai_currentUser', JSON.stringify(currentUser));
            document.getElementById('authScreen').classList.add('hidden'); updateUIForRole();
            showToast(`Selamat datang, ${user.email.split('@')[0]}! 👋`);
        }

        function register() {
            const email = document.getElementById('authEmail').value.trim(), password = document.getElementById('authPassword').value, confirm = document.getElementById('authConfirmPassword')?.value;
            if (!email || !password) { document.getElementById('authError').textContent = 'Isi semua field!'; return; }
            if (password !== confirm) { document.getElementById('authError').textContent = 'Password tidak cocok!'; return; }
            let users = getUsers();
            if (users.find(u => u.email === email)) { document.getElementById('authError').textContent = 'Email sudah terdaftar!'; return; }
            users.push({ email, password, role: 'user' }); saveUsers(users);
            currentUser = { email, role: 'user' };
            localStorage.setItem('abilai_currentUser', JSON.stringify(currentUser));
            document.getElementById('authScreen').classList.add('hidden'); updateUIForRole();
            showToast('Pendaftaran berhasil! 🎉');
        }

        function logout() {
            currentUser = null; localStorage.removeItem('abilai_currentUser');
            document.getElementById('authScreen').classList.remove('hidden'); renderAuthForm('login');
            document.getElementById('adminSettingsBtn').style.display = 'none';
            document.getElementById('vipBtn').style.display = 'none';
        }

        function updateUIForRole() {
            const isAdmin = currentUser?.role === 'admin';
            document.getElementById('adminSettingsBtn').style.display = isAdmin ? 'flex' : 'none';
            document.getElementById('vipBtn').style.display = isAdmin ? 'flex' : 'none';
        }

        function getVipData() { return JSON.parse(localStorage.getItem('abilai_vip') || '[]'); }
        function saveVipData(data) { localStorage.setItem('abilai_vip', JSON.stringify(data)); }
        function addVipAccess() {
            const email = document.getElementById('vipEmailInput').value.trim(), provider = document.getElementById('vipProviderSelect').value, days = parseInt(document.getElementById('vipDurationInput').value) || 3;
            if (!email) { document.getElementById('vipStatus').textContent = 'Masukkan email!'; return; }
            let vips = getVipData(); vips = vips.filter(v => !(v.email === email && v.provider === provider));
            vips.push({ email, provider, expiry: Date.now() + (days * 86400000) }); saveVipData(vips);
            document.getElementById('vipEmailInput').value = '';
            document.getElementById('vipStatus').textContent = `✅ Akses ${provider} diberikan ke ${email} selama ${days} hari.`;
            renderVipList(); showToast('Akses VIP diberikan!');
        }
        
        function removeVipAccess(email, provider) {
            let vips = getVipData(); vips = vips.filter(v => !(v.email === email && v.provider === provider));
            saveVipData(vips); renderVipList(); showToast('Akses VIP dihapus.');
        }
        
        function userHasVipAccess(email, provider) {
            if (!email || !provider) return false;
            if (email === ADMIN_EMAIL) return true;
            const now = Date.now();
            return getVipData().some(v => v.email === email && v.provider === provider && v.expiry > now);
        }
        
        function renderVipList() {
            const container = document.getElementById('vipListContainer'), vips = getVipData();
            if (vips.length === 0) { container.innerHTML = '<p class="text-gray-600 text-xs">Belum ada akses VIP.</p>'; return; }
            const now = Date.now();
            let html = '<table class="vip-table"><thead><tr><th>Email</th><th>Provider</th><th>Kadaluarsa</th><th></th></tr></thead><tbody>';
            vips.forEach(v => {
                const expDate = new Date(v.expiry).toLocaleDateString('id-ID'), isExpired = v.expiry < now;
                html += `<tr style="${isExpired ? 'opacity:0.4;' : ''}"><td>${escapeHtml(v.email)}</td><td>${escapeHtml(API_CONFIGS[v.provider]?.name || v.provider)}</td><td>${expDate} ${isExpired ? '(Kadaluarsa)' : ''}</td><td><span class="delete-vip" onclick="removeVipAccess('${v.email}','${v.provider}')"><i class="fas fa-trash-alt"></i></span></td></tr>`;
            });
            html += '</tbody></table>'; container.innerHTML = html;
        }
        
        function openVipModal() { if (currentUser?.role !== 'admin') return; document.getElementById('vipModal').classList.add('active'); renderVipList(); }
        function closeVipModal() { document.getElementById('vipModal').classList.remove('active'); }
        function closeVipOutside(e) { if (e.target === document.getElementById('vipModal')) closeVipModal(); }

        const SYSTEM_PROMPT = `Kamu adalah Abil-AI, dibuat oleh Abil (Nabil Assihidiqi) dari Indonesia. JANGAN mengaku sebagai AI lain. Ramah & berbahasa Indonesia.`;
        const API_CONFIGS = {
            openai: { name:'ChatGPT', endpoint:'https://api.openai.com/v1/chat/completions', models:['gpt-4o','gpt-4-turbo','gpt-4','gpt-3.5-turbo'], badgeClass:'badge-openai', icon:'fa-robot' },
            gemini: { name:'Gemini', endpoint:'https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent', models:['gemini-pro','gemini-pro-vision'], badgeClass:'badge-gemini', icon:'fa-gem' },
            kimi: { name:'Kimi', endpoint:'https://api.moonshot.ai/v1/chat/completions', models:['moonshot-v1-8k','moonshot-v1-32k','moonshot-v1-128k'], badgeClass:'badge-kimi', icon:'fa-moon' },
            deepseek: { name:'DeepSeek', endpoint:'https://api.deepseek.com/v1/chat/completions', models:['deepseek-chat','deepseek-coder'], badgeClass:'badge-deepseek', icon:'fa-brain' },
            dalle: { name:'DALL-E', endpoint:'https://api.openai.com/v1/images/generations', models:['dall-e-3','dall-e-2'], badgeClass:'badge-dalle', icon:'fa-paint-brush', isImage:true, requiresVip:true },
            theresav: { name:'Theresav AI', endpoint:'https://api.theresav.biz.id/ai/deepseek', models:['v3.2','v3','v2'], badgeClass:'badge-theresav', icon:'fa-bolt', isCustomGet:true, needsChatId:true, requiresVip:true },
            groq: { name:'Groq', endpoint:'https://api.groq.com/openai/v1/chat/completions', models:['llama-3.3-70b-versatile','llama-3.1-8b-instant','llama3-70b-8192','llama3-8b-8192','mixtral-8x7b-32768','gemma2-9b-it'], badgeClass:'badge-groq', icon:'fa-rocket', requiresVip:true }
        };
        
        let currentProvider = 'openai';
        let config = { apiKeys:{}, chatId:'', customEndpoints:{}, customNames:{}, temperature:0.7, maxTokens:2048 };
        let chatHistory = [], chatSessions = [], currentSessionId = null;

        function loadConfig() {
            const saved = localStorage.getItem('abilai_config');
            if (saved) { const p = JSON.parse(saved); config.apiKeys = p.apiKeys || {}; config.chatId = p.chatId || ''; config.customEndpoints = p.customEndpoints || {}; config.customNames = p.customNames || {}; currentProvider = p.currentProvider || 'openai'; }
            const sess = localStorage.getItem('abilai_sessions'); if (sess) chatSessions = JSON.parse(sess);
            applyConfigToUI(); renderChatList(); renderProviderDropdown();
        }
        
        function saveConfig() {
            localStorage.setItem('abilai_config', JSON.stringify({ apiKeys: config.apiKeys, chatId: config.chatId, customEndpoints: config.customEndpoints, customNames: config.customNames, currentProvider }));
            localStorage.setItem('abilai_sessions', JSON.stringify(chatSessions));
        }
        
        function saveCurrentSession() {
            if (!currentSessionId) return;
            const idx = chatSessions.findIndex(s => s.id === currentSessionId);
            const title = chatHistory.length > 0 ? chatHistory[0]?.content?.substring(0, 40) || 'lagi obrolan' : 'obrolan baru';
            if (idx >= 0) { chatSessions[idx].messages = [...chatHistory]; chatSessions[idx].title = title; chatSessions[idx].date = new Date().toISOString(); }
            saveConfig(); renderChatList();
        }
        
        function applyConfigToUI() {
            const apiConfig = API_CONFIGS[currentProvider];
            if (document.getElementById('apiKeyInput')) {
                document.getElementById('apiKeyInput').value = config.apiKeys[currentProvider] || '';
                document.getElementById('apiEndpoint').value = config.customEndpoints[currentProvider] || apiConfig.endpoint;
                document.getElementById('providerLabel').textContent = `(${getDisplayName()})`;
                document.getElementById('modelSelect').innerHTML = apiConfig.models.map(m => `<option value="${m}">${m}</option>`).join('');
                document.getElementById('chatIdGroup').style.display = apiConfig.needsChatId ? 'block' : 'none';
                if (apiConfig.needsChatId) document.getElementById('chatIdInput').value = config.chatId || '';
                document.getElementById('customNameInput').value = config.customNames[currentProvider] || '';
            }
            updateBadge(); renderProviderDropdown();
        }
        
        function getDisplayName() { return config.customNames[currentProvider] || API_CONFIGS[currentProvider].name; }
        function updateBadge() {
            const a = API_CONFIGS[currentProvider];
            document.getElementById('providerBadge').className = 'provider-badge ' + a.badgeClass;
            document.getElementById('providerName').textContent = getDisplayName();
            const iconEl = document.querySelector('#providerBadge i:first-child');
            if (iconEl) iconEl.className = 'fas ' + a.icon;
        }
        
        function canUserAccessProvider(key) {
            const provider = API_CONFIGS[key];
            if (!provider.requiresVip) return true;
            if (currentUser?.role === 'admin') return true;
            return userHasVipAccess(currentUser?.email, key);
        }
        
        function renderProviderDropdown() {
            const dropdown = document.getElementById('providerDropdown'); let html = '';
            for (const [key, provider] of Object.entries(API_CONFIGS)) {
                const hasAccess = canUserAccessProvider(key), hasKey = config.apiKeys[key], display = config.customNames[key] || provider.name;
                html += `<div class="provider-option ${!hasAccess ? 'locked' : ''}" onclick="selectProvider('${key}')"><i class="fas ${provider.icon}"></i> ${escapeHtml(display)} <span style="font-size:0.6rem;">${provider.requiresVip ? (hasAccess ? '👑' : '🔒') : (hasKey ? '✅' : '🔒')}</span></div>`;
            }
            dropdown.innerHTML = html;
        }
        
        function toggleProviderDropdown() { document.getElementById('providerDropdown').classList.toggle('show'); }
        function selectProvider(key) {
            if (!canUserAccessProvider(key)) { showToast('🔒 Anda tidak memiliki akses VIP ke provider ini.'); document.getElementById('providerDropdown').classList.remove('show'); return; }
            if (!config.apiKeys[key]) { showToast('⚠️ API Key belum diatur. Hubungi admin.'); document.getElementById('providerDropdown').classList.remove('show'); return; }
            currentProvider = key; saveConfig(); applyConfigToUI();
            document.getElementById('providerDropdown').classList.remove('show');
            showToast(`Provider diubah ke ${getDisplayName()}`);
        }
        
        document.addEventListener('click', function(e) {
            const badge = document.getElementById('providerBadge'), dropdown = document.getElementById('providerDropdown');
            if (badge && dropdown && !badge.contains(e.target) && !dropdown.contains(e.target)) dropdown.classList.remove('show');
        });
        
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('open'); }
        function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('open'); }
        function renderChatList() {
            const list = document.getElementById('chatList');
            if (chatSessions.length === 0) { list.innerHTML = '<div style="text-align:center;padding:20px;color:#6b7280;font-size:0.8rem;"><i class="fas fa-inbox mb-2" style="font-size:1.5rem;display:block;"></i>Belum ada riwayat</div>'; return; }
            list.innerHTML = chatSessions.slice().reverse().map(s => `<div class="chat-list-item ${s.id === currentSessionId ? 'active' : ''}" onclick="loadSession('${s.id}')"><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escapeHtml(s.title || 'Chat')}</span><button class="delete-chat" onclick="event.stopPropagation();deleteSession('${s.id}')"><i class="fas fa-trash-alt"></i></button></div>`).join('');
        }
        
        function loadSession(id) { saveCurrentSession(); const s = chatSessions.find(s => s.id === id); if (s) { chatHistory = s.messages || []; currentSessionId = s.id; renderChatMessages(); closeSidebar(); } }
        function deleteSession(id) { if (confirm('Hapus chat ini?')) { chatSessions = chatSessions.filter(s => s.id !== id); if (currentSessionId === id) newChat(); saveConfig(); renderChatList(); showToast('Chat dihapus'); } }
        function renderChatMessages() { const c = document.getElementById('messagesContainer'); if (chatHistory.length === 0) { newChat(); return; } c.innerHTML = ''; chatHistory.forEach(m => { if (m.role === 'user') addMessageElement('user', m.content); else addMessageElement('ai', m.content); }); scrollToBottom(); }
        function openSettingsModal() { if (currentUser?.role !== 'admin') { showToast('Hanya admin yang bisa mengakses pengaturan API'); return; } document.getElementById('settingsModal').classList.add('active'); loadConfig(); applyConfigToUI(); }
        function closeSettingsModal() { document.getElementById('settingsModal').classList.remove('active'); }
        function closeSettingsOutside(e) { if (e.target === document.getElementById('settingsModal')) closeSettingsModal(); }
        function switchProviderTab(p) { currentProvider = p; applyConfigToUI(); }
        function toggleApiKeyVisibility() { const i = document.getElementById('apiKeyInput'), ic = document.getElementById('eyeIcon'); i.type === 'password' ? (i.type = 'text', ic.classList.replace('fa-eye', 'fa-eye-slash')) : (i.type = 'password', ic.classList.replace('fa-eye-slash', 'fa-eye')); }
        function saveSettings() {
            config.apiKeys[currentProvider] = document.getElementById('apiKeyInput').value.trim();
            config.chatId = document.getElementById('chatIdInput')?.value?.trim() || '';
            const newEndpoint = document.getElementById('apiEndpoint').value.trim();
            if (newEndpoint && newEndpoint !== API_CONFIGS[currentProvider].endpoint) config.customEndpoints[currentProvider] = newEndpoint;
            else delete config.customEndpoints[currentProvider];
            const customName = document.getElementById('customNameInput').value.trim();
            if (customName && customName !== API_CONFIGS[currentProvider].name) config.customNames[currentProvider] = customName;
            else delete config.customNames[currentProvider];
            saveConfig();
            document.getElementById('settingsStatus').textContent = '✅ Tersimpan!'; document.getElementById('settingsStatus').style.color = '#22c55e';
            updateBadge(); renderProviderDropdown();
            setTimeout(() => { document.getElementById('settingsStatus').textContent = ''; }, 3000);
            showToast(`Pengaturan ${getDisplayName()} disimpan! 🔑`);
        }
        
        function newChat() {
            saveCurrentSession(); chatHistory = []; currentSessionId = 'sess_' + Date.now();
            chatSessions.push({ id: currentSessionId, title: 'lagi obrolan', messages: [], date: new Date().toISOString() });
            saveConfig();
            document.getElementById('messagesContainer').innerHTML = `<div class="animate-fade-in text-center mb-4 mt-8"><p class="text-gray-500 text-xs mb-3">💡 Coba tanyakan:</p><div class="flex flex-wrap justify-center gap-2"><span class="suggestion-chip" onclick="askSuggestion('Halo! Siapa kamu?')">🤖 Siapa Kamu?</span><span class="suggestion-chip" onclick="askSuggestion('Jelaskan tentang AI')">🧠 Jelaskan AI</span><span class="suggestion-chip" onclick="askSuggestion('Buatkan kalkulator')">💻 Kalkulator</span><span class="suggestion-chip" onclick="askSuggestion('Tips coding')">🎯 Tips Coding</span></div></div>`;
            renderChatList(); document.getElementById('userInput').focus();
        }
        
        function askSuggestion(t) { document.getElementById('userInput').value = t; sendMessage(); }
        function handleKeyDown(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
        async function sendMessage() {
            const input = document.getElementById('userInput'), message = input.value.trim();
            if (!message) return;
            if (!config.apiKeys[currentProvider]) { showToast('⚠️ API Key belum diatur. Hubungi admin.'); return; }
            if (API_CONFIGS[currentProvider].needsChatId && !config.chatId) { showToast('⚠️ Chat ID belum diatur!'); return; }
            input.value = ''; input.style.height = 'auto';
            addMessage('user', message); const lid = addLoadingMessage();
            try {
                const a = API_CONFIGS[currentProvider]; let r;
                if (a.isCustomGet) r = await getTheresavResponse(message);
                else if (a.isImage) r = await getDALLEResponse(message);
                else if (currentProvider === 'gemini') r = await getGeminiResponse(message);
                else r = await getStandardResponse(message);
                removeLoadingMessage(lid); addMessage('ai', r);
                saveCurrentSession(); renderChatList();
            } catch (e) { removeLoadingMessage(lid); addMessage('ai', `Gagal Merespon...`); }
            scrollToBottom();
        }
        
        function copyCode(block) {
            const code = block.textContent;
            navigator.clipboard.writeText(code).then(() => {
                showToast('Kode disalin! 📋');
            }).catch(() => {
                const textarea = document.createElement('textarea');
                textarea.value = code;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast('Kode disalin! 📋');
            });
        }
        
        function addMessage(type, content) { addMessageElement(type, content); chatHistory.push({ role: type === 'user' ? 'user' : 'assistant', content }); }
        function addMessageElement(type, content) {
            const container = document.getElementById('messagesContainer'), div = document.createElement('div');
            div.className = type === 'user' ? 'animate-slide-in-right' : 'animate-slide-in-left';
            const isU = type === 'user';
            div.innerHTML = `<div class="flex items-start gap-3 ${isU ? 'justify-end' : ''}">${!isU ? '<div class="w-8 h-8 rounded-lg bg-gradient-to-br from-purple-500 to-pink-600 flex items-center justify-center flex-shrink-0"><span class="text-white font-extrabold text-sm">A</span></div>' : ''}<div class="${isU ? 'message-user' : 'message-ai'} relative">${isU ? escapeHtml(content) : renderMarkdown(content)}</div>${isU ? '<div class="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center flex-shrink-0"><i class="fas fa-user text-white text-xs"></i></div>' : ''}</div>`;
            container.appendChild(div);
            if (!isU) { div.querySelectorAll('pre code').forEach(b => { hljs.highlightElement(b); const p = b.parentElement; p.style.position = 'relative'; const btn = document.createElement('button'); btn.className = 'copy-btn'; btn.innerHTML = '<i class="fas fa-copy"></i> Copy'; btn.onclick = () => copyCode(b); p.appendChild(btn); }); }
        }
        
        function addLoadingMessage() {
            const container = document.getElementById('messagesContainer'), id = 'loading-' + Date.now(), div = document.createElement('div');
            div.id = id; div.className = 'animate-fade-in';
            div.innerHTML = `<div class="flex items-start gap-3"><div class="w-8 h-8 rounded-lg bg-gradient-to-br from-purple-500 to-pink-600 flex items-center justify-center flex-shrink-0"><span class="text-white font-extrabold text-sm">A</span></div><div class="message-ai"><p class="text-gray-500 text-xs mb-2">Memproses...</p><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div></div>`;
            container.appendChild(div); scrollToBottom(); return id;
        }
        
        function removeLoadingMessage(id) { const e = document.getElementById(id); if (e) e.remove(); }
        function renderMarkdown(c) { marked.setOptions({ breaks: true, gfm: true }); return marked.parse(c); }
        function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
        
        function scrollToBottom() { const c = document.getElementById('chatContainer'); setTimeout(() => { c.scrollTop = c.scrollHeight; }, 100); }
        function getActiveEndpoint() { return config.customEndpoints[currentProvider] || API_CONFIGS[currentProvider].endpoint; }

        async function getStandardResponse(message) {
            const activeEndpoint = getActiveEndpoint();
            const body = { model: document.getElementById('modelSelect').value, messages: [{ role: 'system', content: SYSTEM_PROMPT }, ...chatHistory, { role: 'user', content: message }], temperature: config.temperature, max_tokens: config.maxTokens };
            const res = await fetch(activeEndpoint, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${config.apiKeys[currentProvider]}` }, body: JSON.stringify(body) });
            if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error?.message || `HTTP ${res.status}`); }
            return (await res.json()).choices[0].message.content;
        }
        
        async function getGeminiResponse(message) {
            const activeEndpoint = getActiveEndpoint();
            const body = { contents: [{ role: 'user', parts: [{ text: `${SYSTEM_PROMPT}\n\n${message}` }] }], generationConfig: { temperature: config.temperature, maxOutputTokens: config.maxTokens } };
            const res = await fetch(`${activeEndpoint}?key=${config.apiKeys[currentProvider]}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
            if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error?.message || `HTTP ${res.status}`); }
            return (await res.json()).candidates[0].content.parts[0].text;
        }
        
        async function getDALLEResponse(message) {
            const body = { model: document.getElementById('modelSelect').value, prompt: message, n: 1, size: '1024x1024' };
            const res = await fetch('https://api.openai.com/v1/images/generations', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${config.apiKeys[currentProvider]}` }, body: JSON.stringify(body) });
            if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error?.message || `HTTP ${res.status}`); }
            return `🎨 Gambar dibuat!\n\n> "${message}"\n\n![Image](${(await res.json()).data[0].url})`;
        }
        
        async function getTheresavResponse(message) {
            const apiConfig = API_CONFIGS[currentProvider];
            const shortText = `[Abil-AI]: ${message}`;
            const url = `${apiConfig.endpoint}?text=${encodeURIComponent(shortText)}&model=${document.getElementById('modelSelect').value}&chatId=${config.chatId}&apikey=${config.apiKeys[currentProvider]}`;
            const res = await fetch(url, { method: 'GET' });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            if (!data.status) throw new Error('API error');
            return data.result || 'Tidak ada respons.';
        }
        
        function showToast(msg) { const o = document.querySelector('.toast'); if (o) o.remove(); const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg; document.body.appendChild(t); setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; setTimeout(() => t.remove(), 300); }, 3000); }

        document.addEventListener('DOMContentLoaded', () => {
            initUsers();
            if (currentUser) { document.getElementById('authScreen').classList.add('hidden'); updateUIForRole(); } else { renderAuthForm('login'); }
            loadConfig(); updateBadge();
            if (!currentSessionId) newChat();
            document.getElementById('userInput').focus();
            const ta = document.getElementById('userInput');
            ta.addEventListener('input', () => { ta.style.height = 'auto'; ta.style.height = Math.min(ta.scrollHeight, 200) + 'px'; });
        });
        
    </script>
</body>
